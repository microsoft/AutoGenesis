<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automation Details</title>
  <style>
    body {
      font-family: var(--vscode-font-family);
      color: var(--vscode-foreground);
      background-color: var(--vscode-editor-background);
      padding: 20px;
    }
    .header {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--vscode-panel-border);
    }
    .title {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .subtitle {
      font-size: 0.9em;
      color: var(--vscode-descriptionForeground);
    }
    .stats {
      margin: 15px 0;
      padding: 10px;
      background-color: var(--vscode-editor-inactiveSelectionBackground);
      border-radius: 5px;
    }
    .step {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 5px;
      background-color: var(--vscode-editor-lineHighlightBackground);
    }
    .step.implemented {
      border-left: 4px solid #4CAF50;
    }
    .step.not-implemented {
      border-left: 4px solid #FFC107;
    }
    .step.conflict {
      border-left: 4px solid #F44336;
    }
    .status-icon {
      flex: 0 0 30px;
      font-size: 18px;
      font-weight: bold;
    }
    .step-content {
      flex: 1;
    }
    .step-text {
      margin-bottom: 5px;
      font-family: var(--vscode-editor-font-family);
    }
    .implementations {
      margin-top: 8px;
      padding-left: 20px;
    }
    .implemented .status-icon {
      color: #4CAF50;
    }
    .not-implemented .status-icon {
      color: #FFC107;
    }
    .conflict .status-icon {
      color: #F44336;
    }
    .impl-file {
      font-size: 0.9em;
      color: var(--vscode-descriptionForeground);
      margin-top: 5px;
      cursor: pointer;
    }
    .impl-file:hover {
      text-decoration: underline;
      color: var(--vscode-textLink-foreground);
    }
    .step-impl-btn {
      margin-top: 8px;
      font-size: 0.9em;
      background-color: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
      border: none;
      padding: 4px 8px;
      border-radius: 2px;
      cursor: pointer;
    }
    .step-impl-btn:hover {
      background-color: var(--vscode-button-secondaryHoverBackground);
    }
    .impl-details {
      margin-top: 5px;
    }
    .multiple-impls {
      margin-top: 10px;
      padding-top: 5px;
      border-top: 1px dashed var(--vscode-panel-border);
    }
    .impl-item {
      margin-top: 5px;
      padding-left: 8px;
      border-left: 2px solid var(--vscode-panel-border);
    }
    .status-badge {
      display: inline-block;
      padding: 2px 5px;
      border-radius: 2px;
      margin-left: 6px;
      font-weight: normal;
      font-size: 0.8em;
    }
    .status-badge.automated {
      background-color: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
    }
    .status-badge.not-automated {
      background-color: rgba(255, 193, 7, 0.2);
      color: #FFC107;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Automation Details {{STATUS_LABEL}}</div>
    <div class="subtitle">{{SCENARIO_NAME}}</div>
  </div>

  <div class="stats">
    <div>Total Steps: {{STEPS_COUNT}}</div>
    <div>Implemented Steps: {{IMPLEMENTED_COUNT}}</div>
    <div>Missing Steps: {{NOT_IMPLEMENTED_COUNT}}</div>
  </div>

  <h3>Step Implementation Status:</h3>
  <div class="steps">
    {{STEPS_HTML}}
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    
    // Add event listeners to all implementation files
    document.querySelectorAll('.impl-file').forEach(fileLink => {
      fileLink.addEventListener('click', (event) => {
        const target = event.target;
        const file = target.getAttribute('data-file');
        const line = parseInt(target.getAttribute('data-line'), 10);
        
        if (file && !isNaN(line)) {
          vscode.postMessage({
            command: 'openStepImplementation',
            file: file,
            line: line
          });
        }
      });
    });
  </script>
</body>
</html>
